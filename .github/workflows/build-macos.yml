# ============================================================
# Linkon Browser — GitHub Actions macOS Build
# Produces: Linkon-{version}.dmg as a downloadable artifact
# ============================================================

name: Build Linkon macOS DMG

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.0.0)"
        required: false
        default: "1.0.0"

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            V="${{ github.ref_name }}"
            V="${V#v}"
          else
            V="1.0.0"
          fi
          echo "VERSION=$V" >> $GITHUB_OUTPUT
          echo "Building version: $V"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Download Firefox ESR
        run: |
          curl -L "https://download.mozilla.org/?product=firefox-esr-latest&os=osx&lang=en-US" \
            -o firefox-esr.dmg --progress-bar
          echo "✓ Firefox ESR downloaded"

      - name: Extract Firefox.app
        run: |
          mkdir -p build/ff-mount
          hdiutil attach firefox-esr.dmg -mountpoint build/ff-mount -quiet -nobrowse
          cp -R build/ff-mount/Firefox.app build/Firefox.app
          hdiutil detach build/ff-mount -quiet
          echo "✓ Firefox.app extracted"

      - name: Rebrand to Linkon.app
        run: |
          cp -R build/Firefox.app build/Linkon.app
          CONTENTS="build/Linkon.app/Contents"
          mv "$CONTENTS/MacOS/firefox"     "$CONTENTS/MacOS/linkon"     2>/dev/null || true
          mv "$CONTENTS/MacOS/firefox-bin" "$CONTENTS/MacOS/linkon-bin" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleName Linkon"                   "$CONTENTS/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Linkon Browser"    "$CONTENTS/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier browser.linkon.app" "$CONTENTS/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.VERSION }}" "$CONTENTS/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable linkon"             "$CONTENTS/Info.plist"
          echo "✓ Linkon.app created"

      - name: Inject Linkon policies
        run: |
          CONTENTS="build/Linkon.app/Contents"
          mkdir -p "$CONTENTS/Resources/distribution"
          cp browser-config/policies.json "$CONTENTS/Resources/distribution/policies.json"

      - name: Inject cosmic skin + user.js
        run: |
          CONTENTS="build/Linkon.app/Contents"
          PROFILE="$CONTENTS/Resources/browser/defaults/profile"
          mkdir -p "$PROFILE/chrome"
          cp skin/chrome/userChrome.css  "$PROFILE/chrome/userChrome.css"
          cp skin/chrome/userContent.css "$PROFILE/chrome/userContent.css"
          cat > "$PROFILE/user.js" << 'EOF'
user_pref("toolkit.legacyUserProfileCustomizations.stylesheets", true);
user_pref("browser.search.defaultenginename", "Linkon Search");
user_pref("datareporting.healthreport.uploadEnabled", false);
user_pref("toolkit.telemetry.enabled", false);
user_pref("extensions.autoDisableScopes", 0);
user_pref("xpinstall.signatures.required", false);
EOF

      - name: Package extension (.xpi)
        run: |
          CONTENTS="build/Linkon.app/Contents"
          EXT_DIR="$CONTENTS/Resources/browser/extensions"
          mkdir -p "$EXT_DIR" build/xpi-staging
          cp extension/manifest/manifest.json build/xpi-staging/
          cp -R extension/src build/xpi-staging/
          cd build/xpi-staging
          zip -r "../../$EXT_DIR/linkon-core@linkon.browser.xpi" . > /dev/null

      - name: Ad-hoc code sign
        run: codesign --force --deep --sign "-" build/Linkon.app

      - name: Create DMG
        run: |
          mkdir -p dist
          create-dmg \
            --volname "Linkon Browser ${{ steps.version.outputs.VERSION }}" \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "Linkon.app" 200 190 \
            --app-drop-link 600 185 \
            "dist/Linkon-${{ steps.version.outputs.VERSION }}.dmg" \
            "build/Linkon.app" || \
          hdiutil create \
            -volname "Linkon Browser ${{ steps.version.outputs.VERSION }}" \
            -srcfolder build/Linkon.app \
            -ov -format UDZO \
            "dist/Linkon-${{ steps.version.outputs.VERSION }}.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linkon-macOS-${{ steps.version.outputs.VERSION }}
          path: dist/Linkon-*.dmg
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: Linkon Browser ${{ steps.version.outputs.VERSION }}
          files: dist/Linkon-*.dmg
