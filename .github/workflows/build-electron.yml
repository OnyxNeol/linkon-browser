name: Build Linkon Electron App

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    defaults:
      run:
        working-directory: linkon-electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx electron-builder --win --x64
      - uses: actions/upload-artifact@v4
        with:
          name: Linkon-Windows
          path: linkon-electron/dist/*.exe
          retention-days: 30

  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    defaults:
      run:
        working-directory: linkon-electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx electron-builder --mac --x64
      - uses: actions/upload-artifact@v4
        with:
          name: Linkon-macOS
          path: linkon-electron/dist/*.dmg
          retention-days: 30

  build-linux:
    name: Linux AppImage + DEB
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: linkon-electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: sudo apt-get install -y libarchive-tools
      - run: npm install
      - run: npx electron-builder --linux --x64
      - uses: actions/upload-artifact@v4
        with:
          name: Linkon-Linux
          path: |
            linkon-electron/dist/*.AppImage
            linkon-electron/dist/*.deb
          retention-days: 30
