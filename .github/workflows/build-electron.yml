name: Build Linkon Electron App

on:
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux AppImage + DEB
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: linkon-electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: sudo apt-get install -y libarchive-tools
      - run: npm install
      - run: npx electron-builder --linux --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: Linkon-Linux-Electron
          path: |
            linkon-electron/dist/*.AppImage
            linkon-electron/dist/*.deb
          retention-days: 30
