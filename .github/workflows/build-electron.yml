name: Build and Publish Linkon Electron App

on:
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build All + Upload to Release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libarchive-tools wine64 wine32 7zip 2>/dev/null || true

      - name: Build Linux
        working-directory: linkon-electron
        run: |
          npm install
          npx electron-builder --linux --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux to Release
        run: |
          for f in linkon-electron/dist/*.AppImage linkon-electron/dist/*.deb; do
            [ -f "$f" ] && echo "Uploading $(basename "$f")..." && gh release upload v1.0.1 "$f" --repo OnyxNeol/linkon-browser --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-others:
    name: Windows + macOS
    needs: build-and-publish
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            platform: win
            artifact: Linkon-Windows
            pattern: "linkon-electron/dist/*.exe"
          - os: macos-latest
            platform: mac
            artifact: Linkon-macOS
            pattern: "linkon-electron/dist/*.dmg"
    defaults:
      run:
        working-directory: linkon-electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx electron-builder --${{ matrix.platform }} --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload to Release
        run: |
          for f in ${{ matrix.pattern }}; do
            [ -f "$f" ] && gh release upload v1.0.1 "$f" --repo OnyxNeol/linkon-browser --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.pattern }}
          retention-days: 30
