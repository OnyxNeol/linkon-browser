# ============================================================
# Linkon Browser — GitHub Actions Linux Build
# Produces: Linkon-{version}.AppImage + .tar.gz
# ============================================================

name: Build Linkon Linux AppImage

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.0.0)"
        required: false
        default: "1.0.0"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            V="${{ github.ref_name }}"
            V="${V#v}"
          else
            V="1.0.0"
          fi
          echo "VERSION=$V" >> $GITHUB_OUTPUT
          echo "Building version: $V"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            wget curl libgtk-3-0 libdbus-glib-1-2 \
            libxt6 libx11-xcb1 fuse libfuse2 \
            patchelf desktop-file-utils
          echo "✓ Dependencies installed"

      - name: Download Firefox ESR (Linux)
        run: |
          wget -q "https://download.mozilla.org/?product=firefox-esr-latest&os=linux64&lang=en-US" \
            -O firefox-esr.tar.bz2 --show-progress
          echo "✓ Firefox ESR downloaded"

      - name: Extract Firefox ESR
        run: |
          mkdir -p build
          tar -xjf firefox-esr.tar.bz2 -C build/
          mv build/firefox build/firefox-esr
          echo "✓ Extracted to build/firefox-esr"

      - name: Rebrand to Linkon
        run: |
          cp -R build/firefox-esr build/linkon
          # Rename main binary
          mv build/linkon/firefox build/linkon/linkon 2>/dev/null || true
          mv build/linkon/firefox-bin build/linkon/linkon-bin 2>/dev/null || true
          echo "✓ Renamed to linkon"

      - name: Inject Linkon policies + autoconfig
        run: |
          mkdir -p build/linkon/distribution
          cp browser-config/policies.json build/linkon/distribution/policies.json
          cp browser-config/linkon.cfg build/linkon/linkon.cfg

          # autoconfig loader
          cat > build/linkon/defaults/pref/autoconfig.js << 'EOF'
pref("general.config.filename", "linkon.cfg");
pref("general.config.obscure_value", 0);
EOF
          echo "✓ Policies injected"

      - name: Inject cosmic skin + user.js
        run: |
          PROFILE="build/linkon/browser/defaults/profile"
          mkdir -p "$PROFILE/chrome"

          cp skin/chrome/userChrome.css  "$PROFILE/chrome/userChrome.css"
          cp skin/chrome/userContent.css "$PROFILE/chrome/userContent.css"

          cat > "$PROFILE/user.js" << 'EOF'
user_pref("toolkit.legacyUserProfileCustomizations.stylesheets", true);
user_pref("browser.search.defaultenginename", "Linkon Search");
user_pref("browser.startup.homepage", "about:newtab");
user_pref("datareporting.healthreport.uploadEnabled", false);
user_pref("toolkit.telemetry.enabled", false);
user_pref("extensions.autoDisableScopes", 0);
user_pref("extensions.enabledScopes", 15);
user_pref("xpinstall.signatures.required", false);
EOF
          echo "✓ Cosmic skin applied"

      - name: Package Linkon extension (.xpi)
        run: |
          EXT_DIR="build/linkon/browser/extensions"
          mkdir -p "$EXT_DIR" build/xpi-staging

          cp extension/manifest/manifest.json build/xpi-staging/
          cp -R extension/src build/xpi-staging/

          cd build/xpi-staging
          zip -r "../../$EXT_DIR/linkon-core@linkon.browser.xpi" . > /dev/null
          cd ../..
          echo "✓ Extension packaged"

      - name: Create .desktop file
        run: |
          mkdir -p build/linkon-appdir/usr/share/applications
          cat > build/linkon-appdir/usr/share/applications/linkon.desktop << EOF
[Desktop Entry]
Name=Linkon Browser
Comment=A developer's OS inside a browser
Exec=linkon %u
Icon=linkon
Type=Application
Categories=Network;WebBrowser;
MimeType=text/html;text/xml;application/xhtml+xml;x-scheme-handler/http;x-scheme-handler/https;
StartupNotify=true
EOF
          echo "✓ .desktop file created"

      - name: Build tar.gz package
        run: |
          mkdir -p dist
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Create wrapper script
          cat > build/linkon/linkon-browser << 'EOF'
#!/bin/bash
DIR="$(dirname "$(readlink -f "$0")")"
exec "$DIR/linkon" "$@"
EOF
          chmod +x build/linkon/linkon-browser

          tar -czf "dist/Linkon-$VERSION-linux-x86_64.tar.gz" \
            -C build linkon
          echo "✓ tar.gz created: dist/Linkon-$VERSION-linux-x86_64.tar.gz"

      - name: Build AppImage
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Download appimagetool
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O appimagetool
          chmod +x appimagetool

          # Set up AppDir
          APPDIR="build/Linkon.AppDir"
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/lib/linkon"

          cp -R build/linkon/. "$APPDIR/usr/lib/linkon/"
          ln -sf "../lib/linkon/linkon" "$APPDIR/usr/bin/linkon"

          # AppRun entrypoint
          cat > "$APPDIR/AppRun" << 'EOF'
#!/bin/bash
HERE="$(dirname "$(readlink -f "$0")")"
export PATH="$HERE/usr/bin:$PATH"
exec "$HERE/usr/lib/linkon/linkon" "$@"
EOF
          chmod +x "$APPDIR/AppRun"

          # Desktop + icon
          cp build/linkon-appdir/usr/share/applications/linkon.desktop "$APPDIR/"
          # Use Firefox icon as placeholder
          cp build/linkon/browser/chrome/icons/default/default128.png "$APPDIR/linkon.png" 2>/dev/null || \
          wget -q "https://raw.githubusercontent.com/mozilla/gecko-dev/master/browser/branding/unofficial/default128.png" \
            -O "$APPDIR/linkon.png" 2>/dev/null || touch "$APPDIR/linkon.png"

          # Build AppImage
          ARCH=x86_64 ./appimagetool "$APPDIR" "dist/Linkon-$VERSION-x86_64.AppImage" || \
          echo "AppImage build skipped (FUSE not available in CI) — tar.gz is the primary artifact"

          echo "✓ Build complete"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Linkon-Linux-${{ steps.version.outputs.VERSION }}
          path: |
            dist/Linkon-*.tar.gz
            dist/Linkon-*.AppImage
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: Linkon Browser ${{ steps.version.outputs.VERSION }}
          files: |
            dist/Linkon-*.tar.gz
            dist/Linkon-*.AppImage
