name: Build Linkon All Platforms

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.0)"
        required: false
        default: "1.0.0"

jobs:

  # ── Windows EXE ────────────────────────────────────────────
  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: ver
        shell: pwsh
        run: |
          $v = if ("${{ github.event.inputs.version }}" -ne "") { "${{ github.event.inputs.version }}" }
               elseif ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}".TrimStart("v") }
               else { "1.0.0" }
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --yes --no-progress

      - name: Download Firefox ESR
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://download.mozilla.org/?product=firefox-esr-latest&os=win64&lang=en-US" `
            -OutFile "firefox-esr-setup.exe" -UseBasicParsing

      - name: Extract Firefox ESR
        shell: pwsh
        run: |
          $dest = "${{ github.workspace }}\build\firefox-esr"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Start-Process -FilePath ".\firefox-esr-setup.exe" -ArgumentList "/S /D=$dest" -Wait -NoNewWindow

      - name: Inject Linkon config + extension + skin
        shell: pwsh
        run: |
          $ff = "${{ github.workspace }}\build\firefox-esr"
          New-Item -ItemType Directory -Force -Path "$ff\distribution" | Out-Null
          Copy-Item "browser-config\policies.json" "$ff\distribution\policies.json"
          Copy-Item "browser-config\linkon.cfg" "$ff\linkon.cfg"
          $extDir = "$ff\browser\extensions"
          New-Item -ItemType Directory -Force -Path $extDir | Out-Null
          $stage = "${{ github.workspace }}\build\xpi-stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "extension\manifest\manifest.json" "$stage\manifest.json"
          Copy-Item "extension\src" "$stage\src" -Recurse
          Compress-Archive -Path "$stage\*" -DestinationPath "$extDir\linkon-core@linkon.browser.xpi" -Force
          $chrome = "$ff\browser\defaults\profile\chrome"
          New-Item -ItemType Directory -Force -Path $chrome | Out-Null
          Copy-Item "skin\chrome\userChrome.css"  "$chrome\userChrome.css"
          Copy-Item "skin\chrome\userContent.css" "$chrome\userContent.css"
          $userjs = 'user_pref("toolkit.legacyUserProfileCustomizations.stylesheets", true);' + "`n"
          $userjs += 'user_pref("browser.search.defaultenginename", "Linkon Search");' + "`n"
          $userjs += 'user_pref("datareporting.healthreport.uploadEnabled", false);' + "`n"
          $userjs += 'user_pref("toolkit.telemetry.enabled", false);' + "`n"
          $userjs += 'user_pref("extensions.autoDisableScopes", 0);' + "`n"
          $userjs += 'user_pref("extensions.enabledScopes", 15);' + "`n"
          $userjs += 'user_pref("xpinstall.signatures.required", false);'
          $userjs | Set-Content "$ff\browser\defaults\profile\user.js"
          Copy-Item "$ff\firefox.exe" "$ff\Linkon.exe"

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.VERSION }}"
          $ff = "${{ github.workspace }}\build\firefox-esr"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $nsi = "Unicode True`nSetCompressor /SOLID lzma`nName `"Linkon Browser $v`"`nOutFile `"${{ github.workspace }}\dist\LinkonSetup-$v.exe`"`nInstallDir `"`$PROGRAMFILES64\Linkon Browser`"`nRequestExecutionLevel admin`nShowInstDetails show`n!include `"MUI2.nsh`"`n!define MUI_ABORTWARNING`n!insertmacro MUI_PAGE_WELCOME`n!insertmacro MUI_PAGE_DIRECTORY`n!insertmacro MUI_PAGE_INSTFILES`n!define MUI_FINISHPAGE_RUN `"`$INSTDIR\Linkon.exe`"`n!define MUI_FINISHPAGE_RUN_TEXT `"Launch Linkon Browser`"`n!insertmacro MUI_PAGE_FINISH`n!insertmacro MUI_UNPAGE_INSTFILES`n!insertmacro MUI_LANGUAGE `"English`"`nSection `"Linkon Browser`"`n  SetOutPath `"`$INSTDIR`"`n  File /r `"$ff\*.*`"`n  CreateShortCut `"`$DESKTOP\Linkon Browser.lnk`" `"`$INSTDIR\Linkon.exe`"`n  CreateDirectory `"`$SMPROGRAMS\Linkon Browser`"`n  CreateShortCut `"`$SMPROGRAMS\Linkon Browser\Linkon.lnk`" `"`$INSTDIR\Linkon.exe`"`n  WriteRegStr HKLM `"Software\Microsoft\Windows\CurrentVersion\Uninstall\Linkon`" `"DisplayName`" `"Linkon Browser`"`n  WriteUninstaller `"`$INSTDIR\uninstall.exe`"`nSectionEnd`nSection `"Uninstall`"`n  RMDir /r `"`$INSTDIR`"`n  Delete `"`$DESKTOP\Linkon Browser.lnk`"`n  DeleteRegKey HKLM `"Software\Microsoft\Windows\CurrentVersion\Uninstall\Linkon`"`nSectionEnd"
          $nsi | Set-Content "build\installer.nsi" -Encoding UTF8
          makensis "build\installer.nsi"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linkon-Windows-${{ steps.ver.outputs.VERSION }}
          path: dist/LinkonSetup-*.exe
          retention-days: 30

  # ── macOS DMG ──────────────────────────────────────────────
  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then V="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then V="${{ github.ref_name }}"; V="${V#v}"
          else V="1.0.0"; fi
          echo "VERSION=$V" >> $GITHUB_OUTPUT

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Download Firefox ESR
        run: |
          curl -L "https://download.mozilla.org/?product=firefox-esr-latest&os=osx&lang=en-US" \
            -o firefox-esr.dmg --progress-bar

      - name: Extract Firefox.app
        run: |
          mkdir -p build/ff-mount
          hdiutil attach firefox-esr.dmg -mountpoint build/ff-mount -quiet -nobrowse
          cp -R "build/ff-mount/Firefox.app" "build/Firefox.app"
          hdiutil detach build/ff-mount -quiet

      - name: Rebrand to Linkon.app
        run: |
          V="${{ steps.ver.outputs.VERSION }}"
          cp -R "build/Firefox.app" "build/Linkon.app"
          C="build/Linkon.app/Contents"
          mv "$C/MacOS/firefox"     "$C/MacOS/linkon"     2>/dev/null || true
          mv "$C/MacOS/firefox-bin" "$C/MacOS/linkon-bin" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleName Linkon"                   "$C/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Linkon Browser"    "$C/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier browser.linkon.app" "$C/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $V"         "$C/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable linkon"             "$C/Info.plist"

      - name: Inject config + extension + skin
        run: |
          C="build/Linkon.app/Contents"
          mkdir -p "$C/Resources/distribution"
          cp browser-config/policies.json "$C/Resources/distribution/policies.json"
          EXT="$C/Resources/browser/extensions"
          mkdir -p "$EXT" build/xpi-stage
          cp extension/manifest/manifest.json build/xpi-stage/
          cp -R extension/src build/xpi-stage/
          cd build/xpi-stage && zip -r "../linkon-core.xpi" . && cd -
          mv build/linkon-core.xpi "$EXT/linkon-core@linkon.browser.xpi"
          CHROME="$C/Resources/browser/defaults/profile/chrome"
          mkdir -p "$CHROME"
          cp skin/chrome/userChrome.css  "$CHROME/"
          cp skin/chrome/userContent.css "$CHROME/"
          printf 'user_pref("toolkit.legacyUserProfileCustomizations.stylesheets", true);\nuser_pref("browser.search.defaultenginename", "Linkon Search");\nuser_pref("datareporting.healthreport.uploadEnabled", false);\nuser_pref("toolkit.telemetry.enabled", false);\nuser_pref("extensions.autoDisableScopes", 0);\nuser_pref("xpinstall.signatures.required", false);\n' > "$C/Resources/browser/defaults/profile/user.js"

      - name: Sign + Build DMG
        run: |
          V="${{ steps.ver.outputs.VERSION }}"
          codesign --force --deep --sign "-" "build/Linkon.app"
          mkdir -p dist
          create-dmg \
            --volname "Linkon Browser $V" \
            --window-pos 200 120 --window-size 800 400 \
            --icon-size 100 --icon "Linkon.app" 200 190 \
            --app-drop-link 600 185 \
            "dist/Linkon-$V.dmg" "build/Linkon.app" || \
          hdiutil create -volname "Linkon Browser $V" \
            -srcfolder build/Linkon.app -ov -format UDZO \
            "dist/Linkon-$V.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linkon-macOS-${{ steps.ver.outputs.VERSION }}
          path: dist/Linkon-*.dmg
          retention-days: 30

  # ── Linux AppImage + tar.gz ────────────────────────────────
  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then V="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then V="${{ github.ref_name }}"; V="${V#v}"
          else V="1.0.0"; fi
          echo "VERSION=$V" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgtk-3-0 libdbus-glib-1-2 libxt6 libx11-xcb1 fuse libfuse2 patchelf

      - name: Download Firefox ESR
        run: |
          wget -q "https://download.mozilla.org/?product=firefox-esr-latest&os=linux64&lang=en-US" \
            -O firefox-esr.tar.bz2

      - name: Extract + rebrand
        run: |
          mkdir -p build
          tar -xjf firefox-esr.tar.bz2 -C build/
          mv build/firefox build/linkon
          mv build/linkon/firefox     build/linkon/linkon     2>/dev/null || true
          mv build/linkon/firefox-bin build/linkon/linkon-bin 2>/dev/null || true

      - name: Inject config + extension + skin
        run: |
          mkdir -p build/linkon/distribution
          cp browser-config/policies.json build/linkon/distribution/policies.json
          cp browser-config/linkon.cfg build/linkon/linkon.cfg
          printf 'pref("general.config.filename", "linkon.cfg");\npref("general.config.obscure_value", 0);\n' \
            > build/linkon/defaults/pref/autoconfig.js
          EXT="build/linkon/browser/extensions"
          mkdir -p "$EXT" build/xpi-stage
          cp extension/manifest/manifest.json build/xpi-stage/
          cp -R extension/src build/xpi-stage/
          cd build/xpi-stage && zip -r "../linkon-core.xpi" . && cd -
          mv build/linkon-core.xpi "$EXT/linkon-core@linkon.browser.xpi"
          CHROME="build/linkon/browser/defaults/profile/chrome"
          mkdir -p "$CHROME"
          cp skin/chrome/userChrome.css  "$CHROME/"
          cp skin/chrome/userContent.css "$CHROME/"
          printf 'user_pref("toolkit.legacyUserProfileCustomizations.stylesheets", true);\nuser_pref("browser.search.defaultenginename", "Linkon Search");\nuser_pref("datareporting.healthreport.uploadEnabled", false);\nuser_pref("toolkit.telemetry.enabled", false);\nuser_pref("extensions.autoDisableScopes", 0);\nuser_pref("xpinstall.signatures.required", false);\n' \
            > build/linkon/browser/defaults/profile/user.js

      - name: Build tar.gz
        run: |
          V="${{ steps.ver.outputs.VERSION }}"
          mkdir -p dist
          tar -czf "dist/Linkon-$V-linux-x86_64.tar.gz" -C build linkon
          echo "Built: dist/Linkon-$V-linux-x86_64.tar.gz"

      - name: Build AppImage
        run: |
          V="${{ steps.ver.outputs.VERSION }}"
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O appimagetool && chmod +x appimagetool
          APPDIR="build/Linkon.AppDir"
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/lib"
          cp -R build/linkon "$APPDIR/usr/lib/linkon"
          ln -sf "../lib/linkon/linkon" "$APPDIR/usr/bin/linkon"
          printf '#!/bin/bash\nHERE="$(dirname "$(readlink -f "$0")")"\nexec "$HERE/usr/lib/linkon/linkon" "$@"\n' \
            > "$APPDIR/AppRun" && chmod +x "$APPDIR/AppRun"
          printf '[Desktop Entry]\nName=Linkon Browser\nExec=linkon\nIcon=linkon\nType=Application\nCategories=Network;WebBrowser;\n' \
            > "$APPDIR/linkon.desktop"
          cp "build/linkon/browser/chrome/icons/default/default128.png" "$APPDIR/linkon.png" 2>/dev/null || \
            wget -q "https://raw.githubusercontent.com/nicowillis/browser-icons/main/firefox.png" \
              -O "$APPDIR/linkon.png" 2>/dev/null || dd if=/dev/urandom bs=1 count=67 2>/dev/null > "$APPDIR/linkon.png"
          ARCH=x86_64 ./appimagetool "$APPDIR" "dist/Linkon-$V-x86_64.AppImage" 2>/dev/null || true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Linkon-Linux-${{ steps.ver.outputs.VERSION }}
          path: |
            dist/Linkon-*.tar.gz
            dist/Linkon-*.AppImage
          retention-days: 30

  # ── GitHub Release (on version tag) ───────────────────────
  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Linkon Browser ${{ github.ref_name }}"
          body: |
            ## ⬡ Linkon Browser ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |---|---|
            | Windows | `LinkonSetup-*.exe` |
            | macOS | `Linkon-*.dmg` |
            | Linux | `Linkon-*-linux-x86_64.tar.gz` or `.AppImage` |

            ### Five Pillars
            - ❄️ Infinite Tabs (Freeze Mode + HAW)
            - 🧠 Offline AI Copilot (Ollama + CodeLlama, zero cloud)
            - ⚗️ S Gallery™ (Docker sandboxes, TB™)
            - 🤖 Linkon Agents (OpenHands)
            - 🌌 Linkon Universe (TeraBites auth + HF storage)

            ### Backend (optional)
            ```bash
            docker-compose up -d
            ```
          files: dist/**/*
          draft: false
          prerelease: false
