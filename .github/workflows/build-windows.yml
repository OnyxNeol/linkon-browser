# ============================================================
# Linkon Browser — GitHub Actions Windows Build
# Produces: LinkonSetup-{version}.exe as a downloadable artifact
# Trigger: push to main, or manually via Actions tab
# ============================================================

name: Build Linkon Windows EXE

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.0.0)"
        required: false
        default: "1.0.0"

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout source ─────────────────────────────────
      - name: Checkout Linkon source
        uses: actions/checkout@v4

      # ── 2. Set version ─────────────────────────────────────
      - name: Set version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $v = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $v = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $v = "1.0.0"
          }
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
          echo "Building version: $v"

      # ── 3. Install NSIS ────────────────────────────────────
      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis --yes --no-progress
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH
          echo "✓ NSIS installed"

      # ── 4. Download Firefox ESR ────────────────────────────
      - name: Download Firefox ESR
        shell: pwsh
        run: |
          $url = "https://download.mozilla.org/?product=firefox-esr-latest&os=win64&lang=en-US"
          $out = "firefox-esr-setup.exe"
          Write-Host "Downloading Firefox ESR…"
          Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          Write-Host "✓ Firefox ESR downloaded ($('{0:N1}' -f ((Get-Item $out).Length / 1MB)) MB)"

      # ── 5. Extract Firefox ESR silently ───────────────────
      - name: Extract Firefox ESR
        shell: pwsh
        run: |
          $dest = "${{ github.workspace }}\build\firefox-esr"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Start-Process -FilePath ".\firefox-esr-setup.exe" `
            -ArgumentList "/S /D=$dest" `
            -Wait -NoNewWindow
          Write-Host "✓ Firefox ESR extracted to $dest"
          Get-ChildItem $dest | Select-Object Name | Write-Host

      # ── 6. Inject Linkon browser config ───────────────────
      - name: Inject Linkon policies + autoconfig
        shell: pwsh
        run: |
          $firefox = "${{ github.workspace }}\build\firefox-esr"

          # Distribution folder (policies)
          $dist = "$firefox\distribution"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item "browser-config\policies.json" "$dist\policies.json"

          # Autoconfig
          Copy-Item "browser-config\autoconfig.js" "$firefox\defaults\pref\autoconfig.js"
          Copy-Item "browser-config\linkon.cfg"    "$firefox\linkon.cfg"

          Write-Host "✓ Browser config injected"

      # ── 7. Package Linkon extension as .xpi ───────────────
      - name: Package Linkon extension (.xpi)
        shell: pwsh
        run: |
          $firefox  = "${{ github.workspace }}\build\firefox-esr"
          $extDir   = "$firefox\browser\extensions"
          $xpiStage = "${{ github.workspace }}\build\xpi-staging"

          New-Item -ItemType Directory -Force -Path $extDir   | Out-Null
          New-Item -ItemType Directory -Force -Path $xpiStage | Out-Null

          # Copy extension files flat
          Copy-Item "extension\manifest\manifest.json" "$xpiStage\manifest.json"
          Copy-Item "extension\src" "$xpiStage\src" -Recurse

          # Zip into .xpi
          $xpiPath = "$extDir\linkon-core@linkon.browser.xpi"
          Compress-Archive -Path "$xpiStage\*" -DestinationPath $xpiPath -Force

          Write-Host "✓ Extension packaged: $xpiPath"

      # ── 8. Inject cosmic skin (userChrome) ────────────────
      - name: Inject Linkon cosmic skin
        shell: pwsh
        run: |
          $firefox     = "${{ github.workspace }}\build\firefox-esr"
          $profileDef  = "$firefox\browser\defaults\profile"
          $chromeDir   = "$profileDef\chrome"

          New-Item -ItemType Directory -Force -Path $chromeDir | Out-Null
          Copy-Item "skin\chrome\userChrome.css"  "$chromeDir\userChrome.css"
          Copy-Item "skin\chrome\userContent.css" "$chromeDir\userContent.css"

          # user.js — enable userChrome + lock settings
          @"
user_pref("toolkit.legacyUserProfileCustomizations.stylesheets", true);
user_pref("browser.tabs.drawInTitlebar", true);
user_pref("browser.search.defaultenginename", "Linkon Search");
user_pref("browser.startup.homepage", "about:newtab");
user_pref("datareporting.healthreport.uploadEnabled", false);
user_pref("toolkit.telemetry.enabled", false);
user_pref("app.shield.optoutstudies.enabled", false);
user_pref("browser.newtabpage.activity-stream.showSponsored", false);
user_pref("extensions.autoDisableScopes", 0);
user_pref("extensions.enabledScopes", 15);
user_pref("xpinstall.signatures.required", false);
"@ | Set-Content "$profileDef\user.js"

          Write-Host "✓ Cosmic skin applied"

      # ── 9. Rename firefox.exe → Linkon.exe ────────────────
      - name: Rename to Linkon.exe
        shell: pwsh
        run: |
          $firefox = "${{ github.workspace }}\build\firefox-esr"
          Copy-Item "$firefox\firefox.exe" "$firefox\Linkon.exe"
          Write-Host "✓ Renamed to Linkon.exe"

      # ── 10. Create assets (placeholder icons) ─────────────
      - name: Create placeholder assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "assets" | Out-Null
          # Download a placeholder icon if none exists
          if (-not (Test-Path "assets\linkon.ico")) {
            Invoke-WebRequest `
              -Uri "https://raw.githubusercontent.com/mozilla/gecko-dev/master/browser/branding/unofficial/default.ico" `
              -OutFile "assets\linkon.ico" -UseBasicParsing -ErrorAction SilentlyContinue
            if (-not (Test-Path "assets\linkon.ico")) {
              # Create minimal valid ICO via PowerShell as last resort
              [System.IO.File]::WriteAllBytes("assets\linkon.ico", [byte[]](0,0,1,0,0,0,0,0))
            }
          }
          Write-Host "✓ Assets ready"

      # ── 11. Build NSIS installer ──────────────────────────
      - name: Build NSIS installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $firefox = "${{ github.workspace }}\build\firefox-esr"
          $outDir  = "${{ github.workspace }}\dist"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $nsis = @"
!define PRODUCT_NAME "Linkon Browser"
!define PRODUCT_VERSION "$version"
!define PRODUCT_PUBLISHER "TeraBites"
!define PRODUCT_WEB_SITE "https://linkon.browser"
!define PRODUCT_DIR_REGKEY "Software\Microsoft\Windows\CurrentVersion\App Paths\Linkon.exe"
!define PRODUCT_UNINST_KEY "Software\Microsoft\Windows\CurrentVersion\Uninstall\`${PRODUCT_NAME}"

SetCompressor /SOLID lzma
Unicode True
Name "`${PRODUCT_NAME} `${PRODUCT_VERSION}"
OutFile "$outDir\LinkonSetup-$version.exe"
InstallDir "`$PROGRAMFILES64\Linkon Browser"
InstallDirRegKey HKLM "`${PRODUCT_DIR_REGKEY}" ""
ShowInstDetails show
ShowUnInstDetails show
RequestExecutionLevel admin

!include "MUI2.nsh"
!define MUI_ABORTWARNING

!insertmacro MUI_PAGE_WELCOME
!insertmacro MUI_PAGE_DIRECTORY
!insertmacro MUI_PAGE_INSTFILES
!define MUI_FINISHPAGE_RUN "`$INSTDIR\Linkon.exe"
!define MUI_FINISHPAGE_RUN_TEXT "Launch Linkon Browser now"
!insertmacro MUI_PAGE_FINISH
!insertmacro MUI_UNPAGE_INSTFILES
!insertmacro MUI_LANGUAGE "English"

Section "Linkon Browser" SEC01
  SetOutPath "`$INSTDIR"
  File /r "$firefox\*.*"
  CreateDirectory "`$SMPROGRAMS\Linkon Browser"
  CreateShortCut  "`$SMPROGRAMS\Linkon Browser\Linkon Browser.lnk" "`$INSTDIR\Linkon.exe"
  CreateShortCut  "`$DESKTOP\Linkon Browser.lnk" "`$INSTDIR\Linkon.exe"
  WriteRegStr HKLM "`${PRODUCT_DIR_REGKEY}" "" "`$INSTDIR\Linkon.exe"
  WriteRegStr HKLM "`${PRODUCT_UNINST_KEY}" "DisplayName"     "`$(^Name)"
  WriteRegStr HKLM "`${PRODUCT_UNINST_KEY}" "UninstallString" "`$INSTDIR\uninstall.exe"
  WriteRegStr HKLM "`${PRODUCT_UNINST_KEY}" "DisplayVersion"  "`${PRODUCT_VERSION}"
  WriteRegStr HKLM "`${PRODUCT_UNINST_KEY}" "Publisher"       "`${PRODUCT_PUBLISHER}"
  WriteRegStr HKLM "`${PRODUCT_UNINST_KEY}" "URLInfoAbout"    "`${PRODUCT_WEB_SITE}"
  WriteUninstaller "`$INSTDIR\uninstall.exe"
SectionEnd

Section "Uninstall"
  Delete "`$INSTDIR\uninstall.exe"
  RMDir /r "`$INSTDIR"
  Delete "`$SMPROGRAMS\Linkon Browser\Linkon Browser.lnk"
  RMDir  "`$SMPROGRAMS\Linkon Browser"
  Delete "`$DESKTOP\Linkon Browser.lnk"
  DeleteRegKey HKLM "`${PRODUCT_UNINST_KEY}"
  DeleteRegKey HKLM "`${PRODUCT_DIR_REGKEY}"
SectionEnd
"@

          $nsisFile = "${{ github.workspace }}\build\installer.nsi"
          $nsis | Set-Content $nsisFile -Encoding UTF8
          makensis $nsisFile
          Write-Host "✓ Installer built: $outDir\LinkonSetup-$version.exe"

      # ── 12. Upload .exe as artifact ────────────────────────
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinkonSetup-${{ steps.version.outputs.VERSION }}
          path: dist\LinkonSetup-*.exe
          retention-days: 30

      # ── 13. Create GitHub Release (on tag push) ────────────
      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: Linkon Browser ${{ steps.version.outputs.VERSION }}
          body: |
            ## ⬡ Linkon Browser ${{ steps.version.outputs.VERSION }}

            ### What's inside
            - Firefox ESR (Gecko rendering engine)
            - Stract search engine (no Google)
            - OpenHands AI agents (local, no API key)
            - Cosmic Universe dashboard (new tab)
            - S Gallery™ sandbox launcher (TB™)
            - Infinite Tabs with Freeze + HAW

            ### Install
            Download `LinkonSetup-${{ steps.version.outputs.VERSION }}.exe` and run it.

            ### Backend services (optional)
            ```bash
            docker-compose up -d
            ```
            Starts Stract (search) + OpenHands (agents) + Ollama (local AI).
          files: dist/LinkonSetup-*.exe
          draft: false
          prerelease: false
