// Linkon Browser autoconfig
// This file is executed as privileged JavaScript at browser startup

// Lock telemetry completely off
lockPref("datareporting.healthreport.uploadEnabled", false);
lockPref("datareporting.policy.dataSubmissionEnabled", false);
lockPref("toolkit.telemetry.enabled", false);
lockPref("toolkit.telemetry.unified", false);
lockPref("toolkit.telemetry.server", "");
lockPref("browser.send_pings", false);

// Remove Google from all search-related prefs
lockPref("browser.search.defaultenginename", "Linkon Search");
lockPref("browser.search.selectedEngine", "Linkon Search");
defaultPref("keyword.URL", "http://localhost:3000/search?q=");

// Pocket — disabled
lockPref("extensions.pocket.enabled", false);

// Firefox studies — disabled
lockPref("app.shield.optoutstudies.enabled", false);
lockPref("app.normandy.enabled", false);

// Enable userChrome
defaultPref("toolkit.legacyUserProfileCustomizations.stylesheets", true);

// Enable extension signing bypass (for unsigned Linkon extension in dev)
defaultPref("xpinstall.signatures.required", false);

// Performance
defaultPref("gfx.webrender.all", true);
defaultPref("layers.acceleration.force-enabled", true);
defaultPref("browser.cache.disk.capacity", 524288);

// Privacy
defaultPref("privacy.trackingprotection.enabled", true);
defaultPref("privacy.trackingprotection.socialtracking.enabled", true);
defaultPref("network.http.referer.XOriginPolicy", 2);
defaultPref("network.http.referer.XOriginTrimmingPolicy", 2);

// DNS over HTTPS via Cloudflare (no Google DNS)
defaultPref("network.trr.mode", 2);
defaultPref("network.trr.uri", "https://mozilla.cloudflare-dns.com/dns-query");
