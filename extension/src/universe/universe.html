<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linkon Universe</title>
  <link rel="stylesheet" href="universe.css" />
</head>
<body>

  <!-- Cosmic starfield background -->
  <canvas id="cosmos-canvas"></canvas>

  <!-- ── Login Screen ───────────────────────── -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <span class="hex-large">⬡</span>
        <h1>Linkon</h1>
        <p class="login-tagline">A developer's universe</p>
      </div>

      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="username">Linkon Pass</label>
          <input id="username" type="text" placeholder="Username" required autofocus />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Password" />
        </div>
        <button type="submit" id="login-btn" class="btn-primary btn-full">
          Enter Universe
        </button>
      </form>

      <p id="login-status" class="login-status"></p>

      <div class="login-foss">
        <span>⬡ Free &amp; Open-Source · MPL 2.0</span>
        <span>No account required for local use</span>
        <a href="https://github.com/OnyxNeol/linkon-browser" target="_blank">GitHub</a>
      </div>
    </div>
  </div>

  <!-- ── Universe Dashboard ─────────────────── -->
  <div id="universe-dashboard">

    <!-- Top Nav -->
    <nav id="top-nav"></nav>

    <!-- Body: Sidebar + Main + Panels -->
    <div class="dashboard-body">

      <!-- Sidebar -->
      <aside id="sidebar"></aside>

      <!-- Main Content -->
      <main id="main-content">
        <div id="galaxy-grid"></div>
        <div id="drop-zone"></div>
      </main>

      <!-- Floating Panels (overlay) -->
      <div id="sgallery-panel" class="side-panel" style="display:none;"></div>
      <div id="tabs-panel"     class="side-panel" style="display:none;"></div>
      <div id="agents-panel"   class="side-panel" style="display:none;"></div>
      <div id="ai-panel"       class="side-panel ai-panel-style" style="display:none;"></div>

    </div>

    <!-- Stats Bar -->
    <footer id="stats-bar"></footer>

  </div>

  <!-- Floating AI button -->
  <button id="ai-float-btn" title="AI Copilot (Offline)">🧠</button>

  <!-- Modal container -->
  <div id="linkon-modal" style="display:none;"></div>

  <script src="universe.js"></script>
</body>
</html>
