<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; script-src 'self'"/>
  <title>Linkon Browser</title>
  <link rel="stylesheet" href="shell.css"/>
</head>
<body>

  <!-- ── Auth Overlay (shown until logged in) ─────────────────── -->
  <div id="auth-overlay">
    <div id="auth-bg"></div>
    <div id="auth-card">
      <img id="auth-logo" src="../../../assets/linkon.png" alt="Linkon"/>
      <div id="auth-title">Linkon Browser</div>
      <div id="auth-tagline">
        A developer's universe.<br/>
        Free. Open-source. No charges. Ever.
      </div>

      <div id="auth-buttons">

        <!-- GitHub OAuth -->
        <button class="auth-btn auth-btn-github" id="btn-login-github">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.11.82-.26.82-.57v-2c-3.34.73-4.03-1.61-4.03-1.61-.55-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .1-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.14-.3-.54-1.52.1-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 013-.4c1.02 0 2.04.13 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.64 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .31.21.69.82.57C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          Continue with GitHub
        </button>

        <!-- Hugging Face OAuth -->
        <button class="auth-btn auth-btn-hf" id="btn-login-hf">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <text x="2" y="19" font-size="18">🤗</text>
          </svg>
          Continue with Hugging Face
        </button>

        <!-- Skip / Local mode -->
        <button class="auth-btn auth-btn-local" id="btn-login-local">
          Use locally without account
        </button>

      </div>

      <div id="auth-status"></div>

      <div id="auth-foss">
        ⬡ Free &amp; Open-Source · MPL 2.0<br/>
        No telemetry · No Google · No charges
      </div>
    </div>
  </div>

  <!-- ── Profile pill (visible after login) ───────────────────── -->
  <div id="profile-pill">
    <img id="profile-avatar" src="" alt=""/>
    <div>
      <div id="profile-name">User</div>
      <div id="profile-badge">Linkon Universe</div>
    </div>
  </div>

  <!-- ── Titlebar + Tab strip ─────────────────────────────────── -->
  <header id="titlebar">
    <div id="drag-region"></div>
    <div id="logo-wrap">
      <img id="logo-img" src="../../../assets/linkon.png" alt="Linkon"/>
    </div>
    <div id="tab-strip" role="tablist"></div>
    <button id="btn-new-tab" title="New Tab (Ctrl+T)">＋</button>
    <div id="win-controls">
      <button id="btn-min"   title="Minimize">─</button>
      <button id="btn-max"   title="Maximize">□</button>
      <button id="btn-close" title="Close">✕</button>
    </div>
  </header>

  <!-- ── Navigation bar ───────────────────────────────────────── -->
  <nav id="navbar">
    <button class="nav-btn active" id="btn-sidebar"  title="Sidebar">⬡</button>
    <button class="nav-btn"        id="btn-back"      title="Back">‹</button>
    <button class="nav-btn"        id="btn-forward"   title="Forward">›</button>
    <button class="nav-btn"        id="btn-reload"    title="Reload">↻</button>
    <div id="url-bar-wrap">
      <span id="url-scheme-icon">🔒</span>
      <input id="url-bar" type="text" spellcheck="false"
             placeholder="Search with Stract or enter address…"
             autocomplete="off" autocorrect="off"/>
    </div>
    <button class="nav-btn" id="btn-sgallery" title="S Gallery">⚗</button>
    <button class="nav-btn" id="btn-ai"       title="AI Copilot">🧠</button>
  </nav>

  <!-- ── Sidebar ───────────────────────────────────────────────── -->
  <aside id="sidebar">
    <nav id="sidebar-nav">
      <button class="sb-btn active" data-page="linkon://universe" title="Universe">🌌</button>
      <button class="sb-btn"        data-page="linkon://sgallery" title="S Gallery">⚗</button>
      <button class="sb-btn"        data-page="linkon://agents"   title="Agents">🤖</button>
      <button class="sb-btn"        data-page="linkon://settings" title="Settings">⚙</button>
    </nav>
  </aside>

  <script src="shell.js"></script>
</body>
</html>
